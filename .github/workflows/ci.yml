name: CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/fixflow-backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/fixflow-backend:${{ github.ref_name }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/fixflow-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/fixflow-frontend:${{ github.ref_name }}

      - name: Log deployment info
        run: |
          echo "Deployed image tag: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Backend: ${{ env.IMAGE_PREFIX }}/fixflow-backend:${{ github.sha }}"
          echo "Frontend: ${{ env.IMAGE_PREFIX }}/fixflow-frontend:${{ github.sha }}"
