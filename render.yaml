databases:
  - name: fixflow-db
    databaseName: fixflow
    user: fixflow
    plan: free

services:
  - type: web
    name: fixflow-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fixflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://fixflow-frontend.onrender.com

  - type: web
    name: fixflow-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://fixflow-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
